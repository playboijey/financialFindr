<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pluto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050308;
      --surface: #10091b;
      --surface-2: #171022;
      --text: #f3efff;
      --muted: #aa9fc4;
      --green: #7851ff;
      --green-dim: rgba(120, 81, 255, 0.18);
      --warn: #ff8a5b;
      --border: rgba(120, 81, 255, 0.24);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Mono", monospace;
      color: var(--text);
      background:
        linear-gradient(rgba(120, 81, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120, 81, 255, 0.04) 1px, transparent 1px),
        var(--bg);
      background-size: 42px 42px, 42px 42px, auto;
    }

    .page {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0 80px;
    }

    .hero {
      text-align: center;
      margin-bottom: 32px;
    }

    .title {
      font-family: "Syne", sans-serif;
      font-size: clamp(2.5rem, 6vw, 4.8rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      color: var(--green);
      margin: 0;
      text-shadow: 0 0 30px rgba(120, 81, 255, 0.28);
    }

    .title span { color: white; }

    .subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 0.72rem;
    }

    .search {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      width: min(720px, 100%);
      margin: 0 auto 14px;
    }

    input, button {
      font: inherit;
    }

    #ticker-input {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: white;
      padding: 18px 20px;
      outline: none;
    }

    #ticker-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px var(--green-dim);
    }

    #analyze-btn {
      border: none;
      border-radius: 10px;
      background: var(--green);
      color: black;
      font-weight: 700;
      padding: 18px 24px;
      cursor: pointer;
    }

    .quick-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 16px;
    }

    .quick-list button {
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .quick-list button:hover {
      color: var(--green);
      border-color: var(--green);
    }

    #status {
      min-height: 24px;
      text-align: center;
      color: var(--warn);
      font-size: 0.8rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.35fr 1fr;
      gap: 18px;
      margin-top: 28px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-top: 2px solid var(--green);
      border-radius: 18px;
      padding: 22px;
      min-height: 220px;
    }

    .panel h2 {
      margin: 0 0 16px;
      font-family: "Syne", sans-serif;
      font-size: 1.5rem;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .meta-card, .ratio-card {
      background: var(--surface-2);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 16px;
    }

    .label {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.64rem;
      margin-bottom: 10px;
    }

    .value {
      font-family: "Syne", sans-serif;
      font-size: 2rem;
      line-height: 1;
    }

    .value.good { color: var(--green); }
    .value.warn { color: #c7b5ff; }
    .value.bad { color: var(--warn); }

    .ratio-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .ratio-card p {
      color: var(--muted);
      margin: 10px 0 0;
      font-size: 0.74rem;
      line-height: 1.5;
    }

    .filings-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .section-kicker {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.68rem;
      margin: 18px 0 10px;
    }

    .filing-link {
      display: block;
      text-decoration: none;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 14px 16px;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }

    .filing-link:hover {
      border-color: var(--green);
      transform: translateY(-1px);
    }

    .filing-meta {
      color: var(--muted);
      font-size: 0.74rem;
      margin-top: 6px;
    }

    .filing-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .filing-form {
      font-family: "Syne", sans-serif;
      font-size: 1.1rem;
    }

    .filing-tag {
      color: black;
      background: var(--green);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .empty {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.7;
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .meta,
      .ratio-list {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .search {
        grid-template-columns: 1fr;
      }

      .page {
        width: min(100% - 20px, 1100px);
        padding-top: 32px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1 class="title">Pluto</h1>
      <p class="subtitle">Financial analysis, one ticker away</p>
    </section>

    <section>
      <div class="search">
        <input id="ticker-input" type="text" placeholder="Enter a ticker like AAPL or MSFT" maxlength="10" />
        <button id="analyze-btn" type="button">Analyze</button>
      </div>
      <div class="quick-list">
        <button type="button" data-ticker="AAPL">AAPL</button>
        <button type="button" data-ticker="MSFT">MSFT</button>
        <button type="button" data-ticker="NVDA">NVDA</button>
        <button type="button" data-ticker="AMZN">AMZN</button>
        <button type="button" data-ticker="TSLA">TSLA</button>
      </div>
      <div id="status"></div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>Technical Snapshot</h2>
        <div id="summary" class="empty">Run an analysis to see moving averages and the generated buy, sell, or hold signal.</div>
      </div>
      <div class="panel">
        <h2>Financial Ratios</h2>
        <div id="ratios" class="empty">Profitability, liquidity, leverage, and efficiency metrics will appear here.</div>
      </div>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const summaryEl = document.getElementById("summary");
    const ratiosEl = document.getElementById("ratios");
    const inputEl = document.getElementById("ticker-input");

    function classifySignal(signal) {
      if (signal === "Buy") return "good";
      if (signal === "Sell") return "bad";
      return "warn";
    }

    function formatRatio(value, percent = false) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "N/A";
      const numeric = Number(value);
      return percent ? `${(numeric * 100).toFixed(2)}%` : numeric.toFixed(2);
    }

    function ratioState(name, value) {
      if (value === null || value === undefined) return "warn";
      if (name === "debt_to_equity") return value <= 1 ? "good" : value <= 2 ? "warn" : "bad";
      if (name === "current_ratio") return value >= 1.5 ? "good" : value >= 1 ? "warn" : "bad";
      return value >= 0.1 ? "good" : value >= 0.03 ? "warn" : "bad";
    }

    function renderSummary(data) {
      const moving = data.moving_averages;
      const filings = data.filings || {};
      const filingLabels = {
        "10-K": "Annual report",
        "10-Q": "Quarterly report",
        "8-K": "Current report"
      };
      const filingCards = Object.entries(filings).map(([form, details]) => `
        <a class="filing-link" href="${details.filing_url}" target="_blank" rel="noopener noreferrer">
          <div class="filing-row">
            <div class="filing-form">${form}</div>
            <div class="filing-tag">${filingLabels[form] || "SEC filing"}</div>
          </div>
          <div class="filing-meta">${details.filing_date}</div>
          <div class="filing-meta">Open filing on sec.gov</div>
        </a>
      `).join("");

      summaryEl.innerHTML = `
        <div class="meta">
          <div class="meta-card">
            <div class="label">Ticker</div>
            <div class="value">${data.ticker}</div>
          </div>
          <div class="meta-card">
            <div class="label">20 Day MA</div>
            <div class="value">$${Number(moving["20_day"]).toFixed(2)}</div>
          </div>
          <div class="meta-card">
            <div class="label">50 Day MA</div>
            <div class="value">$${Number(moving["50_day"]).toFixed(2)}</div>
          </div>
        </div>
        <div class="meta-card">
          <div class="label">Signal</div>
          <div class="value ${classifySignal(data.signal)}">${data.signal}</div>
        </div>
        <div class="section-kicker">Latest SEC Filings</div>
        <div class="filings-list">
          ${filingCards || '<div class="empty">No recent SEC filings available.</div>'}
        </div>
      `;
    }

    function renderRatios(data) {
      const descriptions = {
        roa: "Net income divided by total assets.",
        roe: "Net income divided by shareholder equity.",
        net_profit_margin: "Net income as a share of revenue.",
        current_ratio: "Current assets divided by current liabilities.",
        debt_to_equity: "Total debt divided by shareholder equity.",
        asset_turnover: "Revenue divided by total assets."
      };

      const labels = {
        roa: "Return on Assets",
        roe: "Return on Equity",
        net_profit_margin: "Net Profit Margin",
        current_ratio: "Current Ratio",
        debt_to_equity: "Debt to Equity",
        asset_turnover: "Asset Turnover"
      };

      const percentKeys = new Set(["roa", "roe", "net_profit_margin"]);

      ratiosEl.innerHTML = `
        <div class="ratio-list">
          ${Object.entries(data.ratios).map(([key, value]) => `
            <div class="ratio-card">
              <div class="label">${labels[key]}</div>
              <div class="value ${ratioState(key, value)}">${formatRatio(value, percentKeys.has(key))}</div>
              <p>${descriptions[key]}</p>
            </div>
          `).join("")}
        </div>
      `;
    }

    async function analyzeTicker() {
      const ticker = inputEl.value.trim().toUpperCase();
      if (!ticker) {
        statusEl.textContent = "Enter a ticker symbol.";
        return;
      }

      statusEl.textContent = `Analyzing ${ticker}...`;

      try {
        const [analysisResponse, filingsResponse] = await Promise.all([
          fetch(`/api/analyze?ticker=${encodeURIComponent(ticker)}`),
          fetch(`/api/filings?ticker=${encodeURIComponent(ticker)}`)
        ]);
        const analysisData = await analysisResponse.json();
        const filingsData = await filingsResponse.json();

        if (!analysisResponse.ok) {
          throw new Error(analysisData.error || "Unable to analyze ticker.");
        }

        statusEl.textContent = "";
        const combinedData = {
          ...analysisData,
          filings: filingsResponse.ok ? filingsData.filings : {}
        };
        renderSummary(combinedData);
        renderRatios(combinedData);
      } catch (error) {
        statusEl.textContent = error.message;
      }
    }

    document.getElementById("analyze-btn").addEventListener("click", analyzeTicker);
    inputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter") analyzeTicker();
    });

    document.querySelectorAll("[data-ticker]").forEach((button) => {
      button.addEventListener("click", () => {
        inputEl.value = button.dataset.ticker;
        analyzeTicker();
      });
    });
  </script>
</body>
</html>
